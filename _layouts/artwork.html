---
layout: default
---

<article class="artwork-detail">
  <a href="/artwork/" class="back-link">← Volver a Galería</a>
  
  <h1>{{ page.title }}</h1>
  
  <div class="artwork-meta">
    <span class="date">{{ page.date | date: "%d/%m/%Y" }}</span>
  </div>

  <img 
    src="/assets/img/artwork/{{ page.image }}" 
    alt="{{ page.title }}" 
    class="detail-image"
  >

  <div class="artwork-content">
    {{ content }}
  </div>
</article>
